version: '3.8'

services:
  db:
    image: postgres:15
    container_name: avosaas-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: avosaas
    ports:
      - "5433:5432"
    volumes:
      - avosaas_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: avosaas-backend
    ports:
      - "3005:3005"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/avosaas?schema=public
      PORT: 3005
    depends_on:
      - db

  prisma:
    image: node:20-alpine
    container_name: avosaas-prisma
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "5556:5555"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/avosaas?schema=public
    command: sh -c "npm install prisma && npx prisma studio"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: avosaas-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "4205:4200"
    depends_on:
      - backend

volumes:
  avosaas_data:
