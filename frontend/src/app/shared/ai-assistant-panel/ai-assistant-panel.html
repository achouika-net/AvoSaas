<!-- Floating Toggle Button -->
<button (click)="toggle()" 
        title="فتح المساعد القانوني الذكي"
        aria-label="فتح المساعد القانوني الذكي"
        class="fixed bottom-8 left-8 z-50 w-16 h-16 rounded-full bg-gradient-to-br from-indigo-500 to-indigo-700 text-white shadow-2xl shadow-indigo-500/40 border border-white/20 hover:scale-110 active:scale-95 transition-all duration-300 flex items-center justify-center group">
  <i class="pi pi-sparkles text-2xl group-hover:rotate-12 transition-transform"></i>
  <span class="absolute -top-1 -right-1 flex h-4 w-4">
    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
    <span class="relative inline-flex rounded-full h-4 w-4 bg-indigo-500 border-2 border-dark-900"></span>
  </span>
</button>

<!-- AI Assistant Side Panel (Drawer) -->
<div [class.translate-x-0]="isOpen" [class.translate-x-full]="!isOpen"
     class="fixed top-0 right-0 h-full w-full md:w-96 bg-dark-900/90 backdrop-blur-xl border-l border-dark-700/50 shadow-[-20px_0_50px_rgba(0,0,0,0.5)] z-[60] transition-transform duration-500 ease-in-out flex flex-col pt-20">
  
  <div class="absolute inset-0 bg-gradient-to-b from-indigo-500/5 to-transparent pointer-events-none"></div>

  <!-- Header -->
  <div class="px-6 py-4 flex items-center justify-between border-b border-dark-700/50 relative z-10">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-indigo-500/20 flex items-center justify-center text-indigo-400 border border-indigo-500/20">
        <i class="pi pi-sparkles"></i>
      </div>
      <div>
        <h2 class="text-white font-bold tracking-tight">المساعد القانوني الذكي</h2>
        <p class="text-[10px] text-gray-500 font-medium uppercase tracking-wider">مدعوم بالذكاء الاصطناعي</p>
      </div>
    </div>
    <button (click)="toggle()" title="إغلاق اللوحة الجانبية" aria-label="إغلاق اللوحة الجانبية" class="text-gray-500 hover:text-white transition-colors">
      <i class="pi pi-times"></i>
    </button>
  </div>

  <!-- Content -->
  <div class="flex-1 overflow-y-auto p-6 space-y-6 relative z-10">
    <div class="bg-dark-800/50 border border-dark-700/50 rounded-2xl p-4">
      <p class="text-[10px] text-indigo-400 font-bold mb-2 uppercase tracking-widest">ماذا ترغب في تحضيره؟</p>
      <textarea [(ngModel)]="query" 
                placeholder="مثلاً: صياغة مقال إصلاحي لتصحيح اسم مدعي كما في النموذج..."
                class="w-full bg-transparent border-none focus:ring-0 text-white text-sm placeholder-gray-600 resize-none h-24"
                (keydown.enter)="$event.preventDefault(); askAI()"></textarea>
      
      <div class="flex items-center justify-between pt-2 border-t border-dark-700/50">
        <span class="text-[10px] text-gray-600">القانون المغربي المطبق: <b class="text-gray-400">{{ caseType }}</b></span>
        <button (click)="askAI()" 
                [disabled]="isSearching || !query.trim()"
                class="bg-indigo-500 hover:bg-indigo-600 disabled:bg-gray-700 text-white px-4 py-1.5 rounded-lg text-xs font-bold transition-all active:scale-95 flex items-center gap-2">
          <i *ngIf="isSearching" class="pi pi-spin pi-spinner text-[10px]"></i>
          تحليل
        </button>
      </div>
    </div>

    <!-- AI Output -->
    <div *ngIf="suggestion" class="animate-in slide-in-from-bottom-5 duration-500 space-y-6">
      <div class="space-y-3">
        <h3 class="text-xs font-bold text-gray-400 flex items-center gap-2">
          <i class="pi pi-book text-indigo-400"></i>
          المراجع والمواد القانونية
        </h3>
        <div class="flex flex-wrap gap-2">
          <span *ngFor="let ref of suggestion.references" class="px-2 py-1 rounded bg-indigo-500/10 text-indigo-300 border border-indigo-500/20 text-[10px] font-medium">
            {{ ref }}
          </span>
        </div>
      </div>

      <div class="space-y-3">
        <div class="flex items-center justify-between">
          <h3 class="text-xs font-bold text-gray-400 flex items-center gap-2">
            <i class="pi pi-file-edit text-indigo-400"></i>
            المسودة المقترحة
          </h3>
          <button (click)="copyToClipboard(suggestion.draft)" class="text-[10px] text-indigo-400 hover:text-white transition-colors flex items-center gap-1">
            <i class="pi pi-copy"></i>
            نسخ
          </button>
        </div>
        <div class="bg-dark-800/80 border border-dark-700/50 rounded-2xl p-4 text-xs text-gray-300 leading-relaxed whitespace-pre-wrap select-text">
          {{ suggestion.draft }}
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="!suggestion && !isSearching" class="flex flex-col items-center justify-center p-10 text-center space-y-3 opacity-50">
      <div class="w-12 h-12 rounded-full border border-dark-700 flex items-center justify-center text-gray-600">
        <i class="pi pi-sparkles"></i>
      </div>
      <p class="text-xs text-gray-600">اكتب طلبك القانوني ليقوم المساعد الذكي بتجهيز مسودة احترافية لك</p>
    </div>
  </div>

  <div class="px-6 py-4 border-t border-dark-700/50 text-[10px] text-gray-600 font-medium text-center relative z-10">
    <i class="pi pi-shield text-[8px] mr-1"></i>
    AvoSaas AI Core v1.0 - Moroccan Law Expert
  </div>
</div>
