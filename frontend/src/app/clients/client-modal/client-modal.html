<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <!-- Backdrop -->
  <div class="absolute inset-0 bg-dark-900/60 backdrop-blur-sm" (click)="close()"></div>

  <!-- Modal Content -->
  <div class="relative bg-dark-800 border border-dark-700 w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden animate-fade-in-up">
    <div class="p-6 border-b border-dark-700 flex justify-between items-center bg-dark-800/50">
      <h3 class="text-xl font-bold text-white tracking-tight">إضافة عميل جديد</h3>
      <button (click)="close()" title="إغلاق" aria-label="إغلاق النافذة"
        class="text-gray-500 hover:text-white transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>

    <form (ngSubmit)="save()" class="p-6 space-y-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="md:col-span-2">
          <label class="block text-xs font-semibold text-gray-400 mb-1 uppercase tracking-wider">الاسم الكامل</label>
          <input type="text" [(ngModel)]="client.name" name="name" required
            class="w-full bg-dark-700 border border-dark-600 text-white text-sm rounded-xl focus:ring-primary-500 focus:border-primary-500 block p-3 outline-none transition-all"
            placeholder="أدخل اسم العميل...">
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-400 mb-1 uppercase tracking-wider">نوع العميل</label>
          <select [(ngModel)]="client.type" name="type" title="نوع العميل" aria-label="اختر نوع العميل"
            class="w-full bg-dark-700 border border-dark-600 text-white text-sm rounded-xl focus:ring-primary-500 focus:border-primary-500 block p-3 outline-none transition-all cursor-pointer">
            <option value="INDIVIDUAL">فرد</option>
            <option value="COMPANY">شركة</option>
            <option value="PROFESSIONAL">مهني</option>
          </select>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-400 mb-1 uppercase tracking-wider">رقم الهوية / السجل</label>
          <input type="text" [(ngModel)]="client.identityNumber" name="identityNumber"
            class="w-full bg-dark-700 border border-dark-600 text-white text-sm rounded-xl focus:ring-primary-500 focus:border-primary-500 block p-3 outline-none transition-all"
            placeholder="رقم CIN أو RC...">
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-400 mb-1 uppercase tracking-wider">رقم الهاتف</label>
          <input type="tel" [(ngModel)]="client.phone" name="phone"
            class="w-full bg-dark-700 border border-dark-600 text-white text-sm rounded-xl focus:ring-primary-500 focus:border-primary-500 block p-3 outline-none transition-all"
            placeholder="06XXXXXXXX">
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-400 mb-1 uppercase tracking-wider">البريد الإلكتروني</label>
          <input type="email" [(ngModel)]="client.email" name="email"
            class="w-full bg-dark-700 border border-dark-600 text-white text-sm rounded-xl focus:ring-primary-500 focus:border-primary-500 block p-3 outline-none transition-all"
            placeholder="example@mail.com">
        </div>

        <div class="md:col-span-2">
          <label class="block text-xs font-semibold text-gray-400 mb-1 uppercase tracking-wider">العنوان</label>
          <textarea [(ngModel)]="client.address" name="address" rows="2"
            class="w-full bg-dark-700 border border-dark-600 text-white text-sm rounded-xl focus:ring-primary-500 focus:border-primary-500 block p-3 outline-none transition-all"
            placeholder="العنوان الكامل للعميل..."></textarea>
        </div>
      </div>

      <div class="flex items-center justify-end gap-3 pt-4 border-t border-dark-700">
        <button type="button" (click)="close()" [disabled]="isSaving"
          class="text-gray-400 hover:text-white font-medium text-sm transition-colors disabled:opacity-50">
          إلغاء
        </button>
        <button type="submit" [disabled]="isSaving || !client.name"
          class="bg-primary-500 hover:bg-primary-600 disabled:bg-gray-600 text-white px-8 py-2.5 rounded-xl font-bold transition-all shadow-lg shadow-primary-500/20 active:scale-95 flex items-center gap-2">
          <div *ngIf="isSaving" class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
          {{ isSaving ? 'جاري الحفظ...' : 'حفظ العميل' }}
        </button>
      </div>
    </form>
  </div>
</div>
