<div class="fixed inset-0 bg-dark-950/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
  <div class="bg-dark-800 border border-dark-700 w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden animate-in zoom-in-95 duration-300">
    <!-- Header -->
    <div class="px-8 py-6 border-b border-dark-700 flex items-center justify-between bg-dark-800/50">
      <div>
        <h2 class="text-2xl font-bold text-white">إضافة قضية جديدة</h2>
        <p class="text-gray-400 text-sm mt-1">أدخل بيانات الملف القضائي للعميل</p>
      </div>
      <button (click)="close()" 
              title="إغلاق النافذة"
              aria-label="إغلاق النافذة"
              class="w-10 h-10 rounded-xl bg-dark-700 text-gray-400 hover:text-white transition-all flex items-center justify-center border border-dark-600">
        <i class="pi pi-times"></i>
      </button>
    </div>

    <!-- Form Body -->
    <div class="p-8 space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Title -->
        <div class="space-y-2 md:col-span-2">
          <label class="text-sm font-bold text-gray-300">اسم القضية / موضوع النزاع</label>
          <input [(ngModel)]="caseData.title" type="text" placeholder="مثال: نزاع حول ملكية عقار"
                 class="w-full bg-dark-900 border border-dark-600 rounded-xl px-4 py-3 text-white focus:border-primary-500 focus:ring-1 focus:ring-primary-500 outline-none transition-all">
        </div>

        <!-- Type -->
        <div class="space-y-2">
          <label class="text-sm font-bold text-gray-300">نوع التقاضي</label>
          <select [(ngModel)]="caseData.type"
                  title="اختر نوع التقاضي"
                  class="w-full bg-dark-900 border border-dark-600 rounded-xl px-4 py-3 text-white focus:border-primary-500 outline-none transition-all">
            <option value="CIVIL">مدني</option>
            <option value="COMMERCIAL">تجاري</option>
            <option value="CRIMINAL">جنائي</option>
            <option value="FAMILY">أسرة</option>
            <option value="ADMINISTRATIVE">إداري</option>
          </select>
        </div>

        <!-- Court Name -->
        <div class="space-y-2">
          <label class="text-sm font-bold text-gray-300">المحكمة المختصة</label>
          <input [(ngModel)]="caseData.courtName" type="text" placeholder="مثال: المحكمة الابتدائية بالدار البيضاء"
                 class="w-full bg-dark-900 border border-dark-600 rounded-xl px-4 py-3 text-white focus:border-primary-500 outline-none transition-all">
        </div>

        <!-- Opponent -->
        <div class="space-y-2">
          <label class="text-sm font-bold text-gray-300">الطرف الخصم</label>
          <input [(ngModel)]="caseData.opponentName" type="text" placeholder="اسم الخصم الكامل"
                 class="w-full bg-dark-900 border border-dark-600 rounded-xl px-4 py-3 text-white focus:border-primary-500 outline-none transition-all">
        </div>

        <!-- Primary Number -->
        <div class="space-y-2">
          <label class="text-sm font-bold text-gray-300">رقم الملف الابتدائي</label>
          <input [(ngModel)]="caseData.primaryNumber" type="text" placeholder="مثال: 2024/1203/45"
                 class="w-full bg-dark-900 border border-dark-600 rounded-xl px-4 py-3 text-white focus:border-primary-500 outline-none transition-all">
        </div>
      </div>
    </div>

    <!-- Footer Actions -->
    <div class="px-8 py-6 bg-dark-900/50 border-t border-dark-700 flex items-center justify-end gap-3">
      <button (click)="close()" class="px-6 py-2.5 rounded-xl border border-dark-600 text-gray-400 hover:bg-dark-700 transition-all font-bold">
        إلغاء
      </button>
      <button (click)="save()" [disabled]="isLoading || !caseData.title"
              class="px-8 py-2.5 rounded-xl bg-primary-500 text-white font-bold hover:bg-primary-600 shadow-lg shadow-primary-500/20 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
        <i *ngIf="isLoading" class="pi pi-spin pi-spinner"></i>
        {{ isLoading ? 'جاري الحفظ...' : 'حفظ القضية' }}
      </button>
    </div>
  </div>
</div>
