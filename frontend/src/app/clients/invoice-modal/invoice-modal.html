<div class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center p-4">
  <div class="bg-dark-800 border border-dark-700 rounded-3xl w-full max-w-lg shadow-2xl relative overflow-hidden animate-in fade-in zoom-in-95 duration-300">
    <div class="p-6 border-b border-dark-700 flex justify-between items-center bg-dark-900/50">
      <h3 class="text-xl font-bold text-white flex items-center gap-2 RTL">
        <i class="pi pi-wallet text-primary-500"></i>
        {{ editData ? 'تعديل دفعة / مصاريف' : 'تسجيل دفعة جديدة' }}
      </h3>
      <button (click)="close()" title="إغلاق" class="text-gray-400 hover:text-white transition-colors">
        <i class="pi pi-times"></i>
      </button>
    </div>

    <div class="p-8 space-y-6">
      <!-- Amount -->
      <div class="space-y-4">
        <label class="block text-sm font-semibold text-gray-400 mb-2 RTL">المبلغ (بالدرهم) <span class="text-red-500">*</span></label>
        <div class="relative group">
          <span class="absolute right-4 top-1/2 -translate-y-1/2 font-bold text-primary-500">DH</span>
          <input type="number" [(ngModel)]="invoiceData.amount" 
                 placeholder="0.00"
                 class="w-full bg-dark-900 border border-dark-600 text-white rounded-xl py-4 pr-16 pl-4 focus:ring-2 focus:ring-primary-500 outline-none text-2xl font-mono RTL">
        </div>
      </div>

      <!-- Type & Status -->
      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-2">
          <label class="block text-sm font-semibold text-gray-400 RTL">طبيعة الدفعة</label>
          <select [(ngModel)]="invoiceData.type" title="نوع الدفعة"
                  class="w-full bg-dark-900 border border-dark-600 text-white rounded-xl py-3 px-4 focus:ring-2 focus:ring-primary-500 outline-none appearance-none cursor-pointer RTL">
            <option value="FEES">أتعاب (قسط من الأتعاب)</option>
            <option value="PREPAYMENT">تسبيق (Avance)</option>
            <option value="EXPENSE">مصاريف (قضائية/إدارية)</option>
          </select>
        </div>
        <div class="space-y-2">
          <label class="block text-sm font-semibold text-gray-400 RTL">الحالة</label>
          <select [(ngModel)]="invoiceData.status" title="حالة الدفعة"
                  class="w-full bg-dark-900 border border-dark-600 text-white rounded-xl py-3 px-4 focus:ring-2 focus:ring-primary-500 outline-none appearance-none cursor-pointer RTL">
            <option value="PAID">مدفوعة</option>
            <option value="UNPAID">غير مدفوعة</option>
            <option value="PARTIAL">جزئية</option>
          </select>
        </div>
      </div>

      <!-- Link to Case -->
      <div class="space-y-2">
        <label class="block text-sm font-semibold text-gray-400 RTL">ربط بالملف (اختياري)</label>
        <select [(ngModel)]="invoiceData.caseId" title="اختر القضية"
                class="w-full bg-dark-900 border border-dark-600 text-white rounded-xl py-3 px-4 focus:ring-2 focus:ring-primary-500 outline-none appearance-none cursor-pointer RTL">
          <option value="">-- بدون ملف (عام) --</option>
          <option *ngFor="let c of clientCases" [value]="c.id">{{ c.title }} ({{ c.primaryNumber || 'بدون رقم' }})</option>
        </select>
      </div>

      <!-- Description / Note -->
      <div class="space-y-2">
        <label class="block text-sm font-semibold text-gray-400 RTL">وصف / ملاحظة (غاية الدفعة)</label>
        <textarea [(ngModel)]="invoiceData.description" 
                  rows="3"
                  placeholder="مثال: الواجب القضائي، القسط الأول من الأتعاب..."
                  class="w-full bg-dark-900 border border-dark-600 text-white rounded-xl p-4 focus:ring-2 focus:ring-primary-500 outline-none placeholder:text-gray-600 RTL"></textarea>
      </div>
    </div>

    <div class="p-6 border-t border-dark-700 bg-dark-900/50 flex gap-4">
      <button (click)="save()" 
              [disabled]="isLoading"
              class="flex-1 bg-primary-600 hover:bg-primary-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg flex items-center justify-center gap-2 RTL">
        <i class="pi" [ngClass]="isLoading ? 'pi-spin pi-spinner' : 'pi-check'"></i>
        {{ editData ? 'تحديث البيانات' : 'حفظ الدفعة' }}
      </button>
      <button (click)="close()" class="px-6 py-3 border border-dark-600 text-gray-300 hover:bg-dark-700 rounded-xl transition-colors font-bold RTL">إلغاء</button>
    </div>
  </div>
</div>
